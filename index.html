  <style>
    :root {
      --bg: #ffffff;
      --panel: #f6f6f3;
      --text: #111111;
      --muted: #5f5f5f;
      --line: #d7d7d0;
      --button: #111111;
      --button-text: #ffffff;
      --maroon: #7f0000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    main {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 42px 20px 64px;
    }

    .site-title {
      text-align: center;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin: 0 0 32px;
    }

    .panel {
      background: var(--panel);
      padding: 24px;
      margin: 0 auto 22px;
    }

    .small {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 22px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    h1 {
      font-size: clamp(2.25rem, 8vw, 3.5rem);
      line-height: 1.02;
      margin: 0 0 8px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    h2 {
      font-size: clamp(1.8rem, 6vw, 2.65rem);
      line-height: 1.05;
      margin: 0 0 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .label {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 24px;
      font-style: italic;
    }

    .meta {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
      margin-bottom: 26px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 7px 0;
      font-size: 1rem;
    }

    .meta-row span:first-child { color: var(--muted); }

    .description {
      color: var(--muted);
      font-size: 1.08rem;
      white-space: pre-line;
      margin-bottom: 28px;
    }

    .instruction {
      border-top: 1px solid var(--line);
      padding-top: 22px;
      margin-top: 26px;
      font-size: 1.3rem;
      font-weight: 900;
      white-space: pre-line;
    }

    .bottom-message {
      margin-top: 26px;
      padding: 16px 18px;
      border: 3px solid var(--maroon);
      color: var(--maroon);
      font-size: 1.08rem;
      font-weight: 900;
      white-space: pre-line;
    }

    .button-row {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button {
      display: block;
      width: 100%;
      border: 2px solid var(--button);
      background: var(--button);
      color: var(--button-text);
      padding: 15px 18px;
      font-size: 1rem;
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      border-radius: 0;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--text);
    }

    .number-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .number-link {
      display: grid;
      grid-template-columns: 54px 1fr;
      align-items: center;
      gap: 14px;
      border: 2px solid var(--text);
      color: var(--text);
      text-decoration: none;
      background: #fff;
      min-height: 56px;
    }

    .number-box {
      height: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--text);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .number-name {
      font-weight: 800;
      padding-right: 14px;
    }

    .qr-note {
      margin-top: 22px;
      font-size: 1.08rem;
      color: var(--text);
      font-weight: 700;
    }

    ul { padding-left: 20px; }
  </style>
</head>

• Verified Name — consistently reported across sources

    const app = document.getElementById("app");

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function textBlock(value) {
      return escapeHTML(value).replace(/
/g, "<br>");
    }

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        person: params.get("person"),
        step: params.get("step") || "home"
      };
    }

    function findCase(slug) {
      return cases.find(item => item.slug === slug) || cases[0];
    }

    function titleForStep(step) {
      if (step === "entry") return "Entry";
      if (step === "checkpoint1") return "Checkpoint 1";
      if (step === "checkpoint2") return "Checkpoint 2";
      if (step === "checkpoint3") return "Checkpoint 3";
      if (step === "exit") return "Exit";
      return "";
    }

    function nextInfo(step) {
      if (step === "entry") return ["checkpoint1", "Continue to Checkpoint 1"];
      if (step === "checkpoint1") return ["checkpoint2", "Continue to Checkpoint 2"];
      if (step === "checkpoint2") return ["checkpoint3", "Continue to Checkpoint 3"];
      if (step === "checkpoint3") return ["exit", "Continue to Exit"];
      return ["home", "Return Home"];
    }

    function instructionFor(data, step) {
      if (step === "entry") return data.entryInstruction;
      if (step === "checkpoint1") return data.checkpoints[0];
      if (step === "checkpoint2") return data.checkpoints[1];
      if (step === "checkpoint3") return data.checkpoints[2];
      if (step === "exit") return data.finalExitText;
      return "";
    }

    function renderHome() {

        <a class="number-link" href="?person=${encodeURIComponent(item.slug)}&step=entry">
          <span class="number-box">${escapeHTML(item.id)}</span>
          <span class="number-name">${escapeHTML(item.name)}</span>
        </a>
      `).join("");

          <div class="button-row">
            <a class="button secondary" href="?step=artist">About the Artist</a>
          </div>
        </section>
      `;
    }

        </section>
      `;
    }

    function renderCase() {
      const { person, step } = getParams();
      const data = findCase(person);
      const isEntry = step === "entry";
      const isExit = step === "exit";
      const [nextStep, nextLabel] = nextInfo(step);
      const nextHref = nextStep === "home" ? `?step=home` : `?person=${encodeURIComponent(data.slug)}&step=${nextStep}`;
      const instruction = instructionFor(data, step);

      app.innerHTML = `
        <div class="site-title">Carry What They Carried</div>
        <section class="panel">
          <div class="small">${escapeHTML(titleForStep(step))}</div>
          <h1>${escapeHTML(data.name)}</h1>
          <div class="label">${escapeHTML(data.label)} · ID ${escapeHTML(data.id)}</div>

          ${isEntry ? `
            <div class="meta">
              <div class="meta-row"><span>Detention stay / weight</span><strong>${escapeHTML(data.detentionStay)}</strong></div>
              <div class="meta-row"><span>Balloons</span><strong>${escapeHTML(data.balloons)}</strong></div>
              <div class="meta-row"><span>Bricks</span><strong>${escapeHTML(data.bricks)}</strong></div>
            </div>
            <div class="description">${textBlock(data.description)}</div>
          ` : ""}

          <div class="instruction">${textBlock(instruction)}</div>
          <div class="bottom-message">${textBlock(bottomMessage)}</div>

          <div class="button-row">
            ${!isExit ? `<a class="button" href="${nextHref}">${escapeHTML(nextLabel)}</a>` : ""}
            <a class="button secondary" href="?step=home">Return Home</a>
            <a class="button secondary" href="?step=artist">About the Artist</a>
          </div>
        </section>
      `;
    }

    function render() {
      const { step } = getParams();
      if (step === "home" || (!new URLSearchParams(window.location.search).has("step") && !new URLSearchParams(window.location.search).has("person"))) {
        renderHome();
      } else if (step === "artist") {
        renderArtist();
      } else {
        renderCase();
      }
    }

    render();
  </script>
</body>
</html>
